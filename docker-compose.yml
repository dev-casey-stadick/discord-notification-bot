version: '3.8'

services:
  discord-bot:
    build: .
    container_name: discord-notifications-bot
    restart: unless-stopped
    environment:
      # Load from .env file
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      NOTIFICATION_CHANNEL_ID: ${NOTIFICATION_CHANNEL_ID}
      NOTIFY_USER_ID: ${NOTIFY_USER_ID}
      TRACKED_GUILD_IDS: ${TRACKED_GUILD_IDS}
      TRACKED_VOICE_CHANNELS: ${TRACKED_VOICE_CHANNELS}
    volumes:
      # Optional: persist logs to host machine
      - ./logs:/app/logs
    # Keep container running even if no TTY
    stdin_open: true
    tty: false
