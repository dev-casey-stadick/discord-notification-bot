name: Build & Release Rust Bot

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: rust/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          strip rust/target/${{ matrix.target }}/release/discord-notifications-rs || true

      - name: Create artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cd rust/target/${{ matrix.target }}/release
          tar czf ../../../discord-notifications-rs-${{ matrix.name }}.tar.gz discord-notifications-rs
          cd ../../../
          ls -lh discord-notifications-rs-${{ matrix.name }}.tar.gz

      - name: Create artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd rust/target/${{ matrix.target }}/release
          Compress-Archive -Path discord-notifications-rs.exe -DestinationPath ../../../discord-notifications-rs-${{ matrix.name }}.zip
          cd ../../../
          Get-ChildItem discord-notifications-rs-${{ matrix.name }}.zip | ForEach-Object { Write-Host $_.FullName $_.Length }

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: discord-notifications-rs-${{ matrix.name }}
          path: discord-notifications-rs-${{ matrix.name }}.*
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Display artifacts
        run: find . -type f -name "discord-notifications-rs-*" | sort

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: discord-notifications-rs-*/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build on every push to main (for quick verification)
  quick-build-linux:
    name: Quick build (Linux only)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: rust
        run: cargo build --release

      - name: Check binary
        run: |
          file rust/target/release/discord-notifications-rs
          ls -lh rust/target/release/discord-notifications-rs
